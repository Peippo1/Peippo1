<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Tim Finch — building trustworthy AI products</title>
  <desc id="desc">An animated evidence trail moves from a GitHub issue through an agent runner and verification packet to a human decision.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111527"/>
      <stop offset="0.55" stop-color="#171a31"/>
      <stop offset="1" stop-color="#102b31"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#9e87ff"/><stop offset="0.52" stop-color="#6fd7dd"/><stop offset="1" stop-color="#f1be72"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="flow" d="M172 308 C330 220 420 350 565 278 S820 210 1026 292"/>
  </defs>
  <style>
    .route { stroke-dasharray: 9 15; animation: route 5s linear infinite; }
    .pulse { animation: pulse 2.8s ease-in-out infinite; }
    .pulse-b { animation-delay: .7s; } .pulse-c { animation-delay: 1.4s; } .pulse-d { animation-delay: 2.1s; }
    .wave { animation: drift 8s ease-in-out infinite alternate; }
    @keyframes route { to { stroke-dashoffset: -48; } }
    @keyframes pulse { 0%,100% { opacity:.68 } 50% { opacity:1 } }
    @keyframes drift { to { transform:translateX(28px) } }
    @media (prefers-reduced-motion: reduce) { .route,.pulse,.wave { animation:none } }
  </style>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <g opacity=".14" fill="none" stroke="#87d7d6" class="wave">
    <path d="M-30 105 C140 10 250 180 420 88 S720 16 880 100 1110 158 1240 72"/>
    <path d="M-45 129 C125 34 250 202 420 112 S720 40 880 124 1110 182 1240 96"/>
    <path d="M-60 153 C110 58 250 226 420 136 S720 64 880 148 1110 206 1240 120"/>
  </g>
  <text x="70" y="80" fill="#f7f1e6" font-family="Georgia, serif" font-size="44">Build fast. Review with evidence.</text>
  <text x="72" y="116" fill="#b9bdd0" font-family="system-ui, sans-serif" font-size="18" letter-spacing="1.4">AI PRODUCTS · DELIVERY SYSTEMS · HUMAN CONTROL</text>
  <use href="#flow" fill="none" stroke="#3f4964" stroke-width="3"/>
  <use href="#flow" fill="none" stroke="url(#route)" stroke-width="4" stroke-linecap="round" class="route"/>
  <g font-family="system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(170 308)" class="pulse">
      <circle r="29" fill="#211f3c" stroke="#9e87ff" stroke-width="2"/><circle r="5" fill="#9e87ff" filter="url(#glow)"/>
      <text y="54" fill="#d8d7e2" font-size="14" letter-spacing="1.5">ISSUE</text>
    </g>
    <g transform="translate(438 310)" class="pulse pulse-b">
      <circle r="29" fill="#162c39" stroke="#70c7df" stroke-width="2"/><path d="M-10 4 0-7 10 4M-8 9H8" fill="none" stroke="#70c7df" stroke-width="3" stroke-linecap="round"/>
      <text y="54" fill="#d8d7e2" font-size="14" letter-spacing="1.5">RUNNER</text>
    </g>
    <g transform="translate(716 246)" class="pulse pulse-c">
      <circle r="29" fill="#143236" stroke="#6fd7bd" stroke-width="2"/><path d="m-10 0 7 7 14-15" fill="none" stroke="#6fd7bd" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text y="54" fill="#d8d7e2" font-size="14" letter-spacing="1.5">EVIDENCE</text>
    </g>
    <g transform="translate(1027 292)" class="pulse pulse-d">
      <circle r="32" fill="#382c21" stroke="#f1be72" stroke-width="2"/><circle cy="-7" r="7" fill="none" stroke="#f1be72" stroke-width="2"/><path d="M-13 14c2-11 24-11 26 0" fill="none" stroke="#f1be72" stroke-width="2" stroke-linecap="round"/>
      <text y="58" fill="#f1d7ae" font-size="14" letter-spacing="1.5">HUMAN DECISION</text>
    </g>
  </g>
  <g fill="#f7f1e6" font-family="system-ui, sans-serif" font-size="13">
    <rect x="70" y="156" width="238" height="42" rx="21" fill="#ffffff" opacity=".07"/><text x="91" y="182">PLAN → CHANGE → VERIFY</text>
    <rect x="326" y="156" width="208" height="42" rx="21" fill="#ffffff" opacity=".07"/><text x="347" y="182">RISKS STAY VISIBLE</text>
  </g>
</svg>
